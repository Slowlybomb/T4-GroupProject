#
openapi: 3.0.3
info:
  title: Gondolier API
  version: 0.1.0
  description: |
    MVP API contract for users, workouts, sessions, feed, metrics, and files.
    All endpoints require a Supabase access token in
    `Authorization: Bearer <token>`, except `/api/v1/health`.
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: health
  - name: users
  - name: workouts
  - name: sessions
  - name: feed
  - name: metrics
  - name: files
  - name: realtime
security:
  - bearerAuth: []
paths:
  /api/v1/health:
    get:
      tags: [health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/users/me:
    get:
      tags: [users]
      summary: Get authenticated user profile
      operationId: getCurrentUser
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /api/v1/workouts:
    get:
      tags: [workouts]
      summary: List workouts visible to the authenticated user
      operationId: listWorkouts
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Workout list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutListResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags: [workouts]
      summary: Create a workout
      operationId: createWorkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutRequest"
      responses:
        "201":
          description: Workout created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/workouts/{workout_id}:
    get:
      tags: [workouts]
      summary: Get workout by ID
      operationId: getWorkoutById
      parameters:
        - $ref: "#/components/parameters/workoutId"
      responses:
        "200":
          description: Workout details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/v1/workouts/{workout_id}/like:
    post:
      tags: [workouts]
      summary: Like a workout
      operationId: likeWorkout
      parameters:
        - $ref: "#/components/parameters/workoutId"
      responses:
        "200":
          description: Like applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LikeWorkoutResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/v1/sessions:
    get:
      tags: [sessions]
      summary: List sessions for a workout
      operationId: listSessions
      parameters:
        - name: workout_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
    post:
      tags: [sessions]
      summary: Create a workout session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/sessions/{session_id}:
    get:
      tags: [sessions]
      summary: Get session by ID
      operationId: getSessionById
      parameters:
        - $ref: "#/components/parameters/sessionId"
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /api/v1/sessions/{session_id}/samples:
    get:
      tags: [sessions]
      summary: List session samples
      operationId: listSessionSamples
      parameters:
        - $ref: "#/components/parameters/sessionId"
        - name: from_offset_ms
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
        - name: to_offset_ms
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Samples for the session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSamplesResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    post:
      tags: [sessions]
      summary: Ingest session samples in batch
      operationId: upsertSessionSamples
      parameters:
        - $ref: "#/components/parameters/sessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertSessionSamplesRequest"
      responses:
        "202":
          description: Samples accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSamplesIngestResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/feed:
    get:
      tags: [feed]
      summary: Get social feed
      operationId: getFeed
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/cursor"
      responses:
        "200":
          description: Feed page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /api/v1/metrics/summary:
    get:
      tags: [metrics]
      summary: Get aggregated metrics for current user
      operationId: getMetricsSummary
      parameters:
        - $ref: "#/components/parameters/fromTimestamp"
        - $ref: "#/components/parameters/toTimestamp"
      responses:
        "200":
          description: Metrics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricsSummaryResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /api/v1/files/upload-url:
    post:
      tags: [files]
      summary: Create a signed upload URL for Supabase Storage
      operationId: createUploadUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadURLRequest"
      responses:
        "200":
          description: Signed upload URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateUploadURLResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/files/download-url:
    post:
      tags: [files]
      summary: Create a signed download URL for Supabase Storage
      operationId: createDownloadUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDownloadURLRequest"
      responses:
        "200":
          description: Signed download URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDownloadURLResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "422":
          $ref: "#/components/responses/ValidationError"

  /api/v1/ws:
    get:
      tags: [realtime]
      summary: Open authenticated realtime WebSocket
      operationId: connectRealtime
      description: |
        Upgrades the request to a WebSocket connection.
        Clients must send a JWT bearer token and then subscribe:
        `{"action":"subscribe","channels":["feed","status"]}`.
        Server messages use the envelope
        `{ "channel", "type", "timestamp", "payload" }`.
      responses:
        "101":
          description: Switching protocols to WebSocket
        "401":
          $ref: "#/components/responses/UnauthorizedError"
      x-websocket-channels:
        - name: feed
          events:
            - type: activity.created
              description: Emitted after activity creation succeeds.
        - name: status
          events:
            - type: ws.connected
              description: Sent immediately after connection.
            - type: subscription.updated
              description: Sent after successful subscribe action.
            - type: status.heartbeat
              description: Periodic server heartbeat with online client count.
            - type: error
              description: Sent when message/action validation fails.
        - name: notifications
          events:
            - type: notifications.placeholder
              description: Placeholder event until notification producers are added.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    workoutId:
      name: workout_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    sessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    fromTimestamp:
      name: from
      in: query
      required: true
      schema:
        type: string
        format: date-time
    toTimestamp:
      name: to
      in: query
      required: true
      schema:
        type: string
        format: date-time

  responses:
    BadRequestError:
      description: Request format is invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnauthorizedError:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFoundError:
      description: Resource does not exist or is not visible
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

  schemas:
    HealthResponse:
      type: object
      required: [status, time]
      properties:
        status:
          type: string
          example: ok
        time:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid request
        details:
          type: string
          nullable: true

    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            field_errors:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field:
                    type: string
                  message:
                    type: string

    Profile:
      type: object
      required: [id, username, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        display_name:
          type: string
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        bio:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

    UserResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/Profile"

    Workout:
      type: object
      required: [id, user_id, start_time, visibility, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        username:
          type: string
          nullable: true
          description: Username from the activity owner's profile.
        display_name:
          type: string
          nullable: true
          description: Display name from the activity owner's profile.
        avatar_url:
          type: string
          format: uri
          nullable: true
          description: Avatar URL from the activity owner's profile.
        title:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        start_time:
          type: string
          format: date-time
        duration_seconds:
          type: integer
          minimum: 0
          nullable: true
        distance_m:
          type: number
          format: double
          minimum: 0
          nullable: true
        avg_split_500m_seconds:
          type: integer
          minimum: 0
          nullable: true
        avg_stroke_spm:
          type: integer
          minimum: 0
          nullable: true
        visibility:
          type: string
          enum: [private, followers, public, team]
        team_id:
          type: string
          format: uuid
          nullable: true
        route_geojson:
          type: object
          nullable: true
          additionalProperties: true
        likes:
          type: integer
          minimum: 0
          description: Total likes for this workout
        comments:
          type: integer
          minimum: 0
          description: Total comments for this workout
        created_at:
          type: string
          format: date-time

    CreateWorkoutRequest:
      type: object
      required: [start_time, visibility]
      properties:
        title:
          type: string
          maxLength: 120
        notes:
          type: string
          maxLength: 5000
        start_time:
          type: string
          format: date-time
        duration_seconds:
          type: integer
          minimum: 0
        distance_m:
          type: number
          format: double
          minimum: 0
        avg_split_500m_seconds:
          type: integer
          minimum: 0
        avg_stroke_spm:
          type: integer
          minimum: 0
        visibility:
          type: string
          enum: [private, followers, public, team]
        team_id:
          type: string
          format: uuid
        route_geojson:
          type: object
          additionalProperties: true

    WorkoutResponse:
      type: object
      required: [workout]
      properties:
        workout:
          $ref: "#/components/schemas/Workout"

    WorkoutListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Workout"
        next_cursor:
          type: string
          nullable: true

    LikeWorkoutResponse:
      type: object
      required: [workout_id, likes]
      properties:
        workout_id:
          type: string
          format: uuid
        likes:
          type: integer
          minimum: 0

    Session:
      type: object
      required: [id, workout_id, source, started_at, sample_count, created_at]
      properties:
        id:
          type: string
          format: uuid
        workout_id:
          type: string
          format: uuid
        source:
          type: string
          enum: [device, manual, import]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        sample_count:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time

    CreateSessionRequest:
      type: object
      required: [workout_id, source, started_at]
      properties:
        workout_id:
          type: string
          format: uuid
        source:
          type: string
          enum: [device, manual, import]
        started_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time

    SessionResponse:
      type: object
      required: [session]
      properties:
        session:
          $ref: "#/components/schemas/Session"

    SessionListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Session"
        next_cursor:
          type: string
          nullable: true

    SessionSample:
      type: object
      required: [t_offset_ms]
      properties:
        t_offset_ms:
          type: integer
          minimum: 0
        pace_500m_seconds:
          type: integer
          minimum: 0
          nullable: true
        speed_mps:
          type: number
          format: float
          minimum: 0
          nullable: true
        stroke_spm:
          type: integer
          minimum: 0
          nullable: true
        accuracy_m:
          type: number
          format: float
          minimum: 0
          nullable: true

    UpsertSessionSamplesRequest:
      type: object
      required: [samples]
      properties:
        samples:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SessionSample"

    SessionSamplesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionSample"

    SessionSamplesIngestResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: integer
          minimum: 0

    FeedItem:
      type: object
      required: [workout, actor]
      properties:
        workout:
          $ref: "#/components/schemas/Workout"
        actor:
          $ref: "#/components/schemas/Profile"

    FeedResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FeedItem"
        next_cursor:
          type: string
          nullable: true

    MetricsSummaryResponse:
      type: object
      required:
        - from
        - to
        - total_workouts
        - total_distance_m
        - total_duration_seconds
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        total_workouts:
          type: integer
          minimum: 0
        total_distance_m:
          type: number
          format: double
          minimum: 0
        total_duration_seconds:
          type: integer
          minimum: 0
        avg_split_500m_seconds:
          type: integer
          minimum: 0
          nullable: true
        avg_stroke_spm:
          type: number
          format: float
          minimum: 0
          nullable: true

    CreateUploadURLRequest:
      type: object
      required: [bucket, path, content_type]
      properties:
        bucket:
          type: string
          enum: [avatars, workout-images]
        path:
          type: string
          description: Storage key within the bucket
        content_type:
          type: string
        expires_in_seconds:
          type: integer
          minimum: 60
          maximum: 3600
          default: 600

    CreateUploadURLResponse:
      type: object
      required: [bucket, path, method, upload_url, expires_at]
      properties:
        bucket:
          type: string
        path:
          type: string
        method:
          type: string
          example: PUT
        upload_url:
          type: string
          format: uri
        headers:
          type: object
          additionalProperties:
            type: string
        expires_at:
          type: string
          format: date-time

    CreateDownloadURLRequest:
      type: object
      required: [bucket, path]
      properties:
        bucket:
          type: string
          enum: [avatars, workout-images]
        path:
          type: string
          description: Storage key within the bucket
        expires_in_seconds:
          type: integer
          minimum: 60
          maximum: 3600
          default: 600

    CreateDownloadURLResponse:
      type: object
      required: [bucket, path, download_url, expires_at]
      properties:
        bucket:
          type: string
        path:
          type: string
        download_url:
          type: string
          format: uri
        expires_at:
          type: string
          format: date-time

    WSSubscribeRequest:
      type: object
      required: [action, channels]
      properties:
        action:
          type: string
          enum: [subscribe]
        channels:
          type: array
          minItems: 1
          items:
            type: string
            enum: [feed, status, notifications]

    WSEventEnvelope:
      type: object
      required: [channel, type, timestamp]
      properties:
        channel:
          type: string
          enum: [feed, status, notifications]
        type:
          type: string
          example: activity.created
        timestamp:
          type: string
          format: date-time
        payload:
          type: object
          additionalProperties: true
