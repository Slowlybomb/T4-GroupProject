name: gondolier
description: "Web App for Custom Rowing Computer"
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  smooth_page_indicator: ^1.1.0
  english_words: ^4.0.0
  provider: ^6.1.5
  dio: ^5.9.0
  supabase_flutter: ^2.10.2
  flutter_blue_plus: ^1.32.12
  permission_handler: ^11.3.0
  share_plus: ^10.0.0
  google_maps_flutter: ^2.10.0
  csv: ^6.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/img/
    - assets/geojson/
    - assets/rowingdata/
