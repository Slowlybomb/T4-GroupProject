name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-api:
    name: Go API Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/api/go.mod
          cache-dependency-path: app/api/go.sum

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/server

  flutter-app:
    name: Flutter Analyze/Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/flutter_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test
